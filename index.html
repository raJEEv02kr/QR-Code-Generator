<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- THEME TOGGLE -->
    <div class="theme-panel">

        <div class="theme-info" id="themeLabel">
            <span class="icon">☀</span>
            <span class="text">Light</span>
        </div>

        <label class="switch">
            <input type="checkbox" id="autoToggle">
            <span class="slider"></span>
        </label>

    </div>


    <div class="container">

        <p>Enter your text or URL</p>
        <input type="text" placeholder="Text or URL" id="qrText">

        <!-- QR SIZE SLIDER -->
        <p>QR Size: <span id="sizeValue">150</span>px</p>
        <input type="range" id="qrSize" min="100" max="400" value="150">

        <!-- QR FOREGROUND COLOR -->
        <p>QR Foreground Color</p>
        <input type="color" id="qrColor" value="#000000">

        <!-- QR BACKGROUND COLOR -->
        <p>QR Background Color</p>
        <input type="color" id="qrBgColor" value="#ffffff">

        <!-- LOGO UPLOAD -->
        <p>Upload Logo (Optional)</p>
        <input type="file" id="logoUpload" accept="image/*">

        <!-- QR PREVIEW -->
        <div id="imgBox">
            <canvas id="qrCanvas"></canvas>
        </div>

        <button onclick="generateQRCode()">Generate QR Code</button>

        <button id="downloadBtn" disabled>Download QR Code</button>
        <button id="shareBtn">Share QR Code</button>


        <!-- QR HISTORY SECTION -->
        <div id="historyContainer">

            <p class="historyTitle">Recent QR Codes</p>

            <ul id="historyList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
